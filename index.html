<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFA Minimization Visualizer</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion for premium animations -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Vis-Network for Graph Visualization -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        /* Custom Styles & Scrollbar for premium feel */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Slate 950 */
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Animated High-Tech Grid Background */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.9)),
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center;
            z-index: -2;
        }

        /* Subtle glowing orbs for depth */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #3b82f6; top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 40%; animation-delay: -10s; opacity: 0.2; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-panel {
            background: linear-gradient(165deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }

        /* Vis Network Overrides */
        .vis-network { outline: none; }
        
        /* High-Tech Tooltip */
        div.vis-tooltip {
            background-color: rgba(2, 6, 23, 0.9) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.5) !important;
            color: #38bdf8 !important;
            border-radius: 8px !important;
            font-family: 'JetBrains Mono', monospace !important;
            padding: 10px 14px !important;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3) !important;
            font-size: 14px !important;
            font-weight: bold;
        }

        /* Input Neon Focus */
        .neon-input:focus {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            border-color: rgba(56, 189, 248, 0.8);
        }
    </style>
</head>
<body>

    <!-- Cyberpunk Animated Background -->
    <div class="cyber-bg"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence, LayoutGroup } = window.Motion; // Framer Motion

        // --- CONSTANTS & HELPERS ---
        const PARTITION_COLORS = [
            { bg: '#1e3a8a', border: '#3b82f6', shadow: '#60a5fa' }, // Blue
            { bg: '#7f1d1d', border: '#ef4444', shadow: '#f87171' }, // Red
            { bg: '#064e3b', border: '#10b981', shadow: '#34d399' }, // Green
            { bg: '#78350f', border: '#f59e0b', shadow: '#fbbf24' }, // Yellow
            { bg: '#4c1d95', border: '#8b5cf6', shadow: '#a78bfa' }, // Purple
            { bg: '#831843', border: '#ec4899', shadow: '#f472b6' }, // Pink
            { bg: '#164e63', border: '#06b6d4', shadow: '#22d3ee' }, // Cyan
        ];

        const SAMPLE_DFA = {
            states: ['q0', 'q1', 'q2', 'q3', 'q4', 'q5'],
            alphabet: ['0', '1'],
            startState: 'q0',
            acceptingStates: ['q2', 'q3', 'q4'],
            transitions: {
                'q0': { '0': 'q1', '1': 'q2' },
                'q1': { '0': 'q0', '1': 'q3' },
                'q2': { '0': 'q4', '1': 'q5' },
                'q3': { '0': 'q4', '1': 'q5' },
                'q4': { '0': 'q4', '1': 'q5' },
                'q5': { '0': 'q5', '1': 'q5' }
            }
        };

        const QUIZ_QUESTIONS = [
            {
                dfa: {
                    states: ['q0', 'q1', 'q2'],
                    alphabet: ['0', '1'],
                    startState: 'q0',
                    acceptingStates: ['q2'],
                    transitions: { 'q0': { '0': 'q1', '1': 'q2' }, 'q1': { '0': 'q1', '1': 'q2' }, 'q2': { '0': 'q2', '1': 'q2' } }
                },
                text: "Analyze the DFA matrix. Which set of states are equivalent?",
                options: [
                    { label: "States { q0, q1 }", isCorrect: true },
                    { label: "States { q1, q2 }", isCorrect: false },
                    { label: "States { q0, q2 }", isCorrect: false },
                    { label: "No states are equivalent", isCorrect: false }
                ],
                explanation: "Correct! q0 and q1 both transition to q1 on '0' and to q2 on '1'. Neither is an accepting state, so they are indistinguishable and can be safely merged."
            },
            {
                dfa: {
                    states: ['A', 'B', 'C', 'D'],
                    alphabet: ['a', 'b'],
                    startState: 'A',
                    acceptingStates: ['C'],
                    transitions: { 'A': { 'a': 'B', 'b': 'A' }, 'B': { 'a': 'C', 'b': 'B' }, 'C': { 'a': 'C', 'b': 'C' }, 'D': { 'a': 'A', 'b': 'C' } }
                },
                text: "Identify the structural anomaly. Which state must be eliminated first?",
                options: [
                    { label: "State A", isCorrect: false },
                    { label: "State B", isCorrect: false },
                    { label: "State C", isCorrect: false },
                    { label: "State D", isCorrect: true }
                ],
                explanation: "State D is completely unreachable from the boot node (A). It wastes system memory and must be pruned before performing partition equivalence."
            },
            {
                dfa: {
                    states: ['S0', 'S1'],
                    alphabet: ['x', 'y'],
                    startState: 'S0',
                    acceptingStates: ['S1'],
                    transitions: { 'S0': { 'x': 'S1', 'y': 'S0' }, 'S1': { 'x': 'S0', 'y': 'S1' } }
                },
                text: "Evaluate this simple system. Are there any equivalent states?",
                options: [
                    { label: "Yes, { S0, S1 }", isCorrect: false },
                    { label: "No, it is strictly minimal", isCorrect: true }
                ],
                explanation: "S1 is an accepting state while S0 is not. They fall into completely separate partitions during the initial 0-equivalence step, so they can never be merged."
            },
            {
                dfa: {
                    states: ['q0', 'q1', 'q2', 'q3'],
                    alphabet: ['0', '1'],
                    startState: 'q0',
                    acceptingStates: ['q3'],
                    transitions: { 'q0': { '0': 'q1', '1': 'q2' }, 'q1': { '0': 'q3', '1': 'q3' }, 'q2': { '0': 'q3', '1': 'q3' }, 'q3': { '0': 'q3', '1': 'q3' } }
                },
                text: "Deep analysis required. Which pair of states share identical transition signatures and can be merged?",
                options: [
                    { label: "States { q0, q1 }", isCorrect: false },
                    { label: "States { q1, q2 }", isCorrect: true },
                    { label: "States { q2, q3 }", isCorrect: false },
                    { label: "They are all distinct", isCorrect: false }
                ],
                explanation: "Correct! Both q1 and q2 are non-accepting and transition exclusively to q3 for all inputs. They form a stable equivalent cluster and can be safely merged."
            },
            {
                dfa: {
                    states: ['A', 'B', 'C', 'D', 'E'],
                    alphabet: ['0', '1'],
                    startState: 'A',
                    acceptingStates: ['E'],
                    transitions: { 
                        'A': { '0': 'B', '1': 'C' }, 
                        'B': { '0': 'D', '1': 'D' }, 
                        'C': { '0': 'D', '1': 'D' }, 
                        'D': { '0': 'E', '1': 'E' }, 
                        'E': { '0': 'E', '1': 'E' } 
                    }
                },
                text: "Final Assessment: If you fully minimize this 5-state DFA, how many states will remain in the optimized architecture?",
                options: [
                    { label: "2 States", isCorrect: false },
                    { label: "3 States", isCorrect: false },
                    { label: "4 States", isCorrect: true },
                    { label: "5 States (Already Minimal)", isCorrect: false }
                ],
                explanation: "Correct! States B and C are equivalent (both non-accepting, both go to D). They merge into {B,C}. The final states are {A}, {B,C}, {D}, and {E}, totaling 4 optimized states."
            }
        ];

        // Futuristic Node Generator with built-in glowing filters
        const createNodeSvg = (label, isAccepting, color) => {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90">
                    <defs>
                        <filter id="glow_${color.border.replace('#','')}" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="4" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <!-- Outer Neon Ring -->
                    <circle cx="45" cy="45" r="38" fill="${color.bg}" fill-opacity="0.8" stroke="${color.border}" stroke-width="3" filter="url(#glow_${color.border.replace('#','')})" />
                    
                    <!-- Inner Tech Details -->
                    ${isAccepting ? 
                        `<circle cx="45" cy="45" r="30" fill="none" stroke="${color.border}" stroke-width="2" stroke-dasharray="6 4" opacity="0.9"/>
                         <circle cx="45" cy="45" r="26" fill="none" stroke="${color.border}" stroke-width="1" opacity="0.5"/>` 
                        : 
                        `<circle cx="45" cy="45" r="32" fill="none" stroke="${color.border}" stroke-width="1" opacity="0.3"/>`
                    }
                    
                    <text x="45" y="51" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="18" text-anchor="middle" fill="#ffffff" filter="drop-shadow(0px 0px 2px #fff)">${label}</text>
                </svg>
            `;
            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        };

        // Icons
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const PauseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const NextIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>;
        const ResetIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        // --- ALGORITHM ---
        const getSubscript = (num) => num.toString().split('').map(d => ['₀','₁','₂','₃','₄','₅','₆','₇','₈','₉'][d]).join('');
        
        const formatPi = (k, partitions) => {
            const sets = partitions.map(g => `{${g.join(',')}}`).join(', ');
            return `π${getSubscript(k)} = { ${sets} }`;
        };

        const buildPartitionTable = (dfaStates, oldGroups, newGroups, dfa) => {
            let rows = [];
            dfaStates.forEach(state => {
                let row = { state, inputs: {}, newGroupIndex: -1 };
                dfa.alphabet.forEach(sym => {
                    let target = dfa.transitions[state]?.[sym];
                    let targetGIdx = oldGroups.findIndex(g => g.includes(target));
                    row.inputs[sym] = targetGIdx !== -1 ? targetGIdx : '-';
                });
                row.newGroupIndex = newGroups.findIndex(g => g.includes(state));
                rows.push(row);
            });
            rows.sort((a, b) => a.newGroupIndex - b.newGroupIndex);
            return rows;
        };

        function generateMinimizationSteps(dfa) {
            let steps = [];
            
            // 1. Find Reachable States
            let reachable = new Set([dfa.startState]);
            let queue = [dfa.startState];
            while(queue.length > 0) {
                let q = queue.shift();
                for (let symbol of dfa.alphabet) {
                    let next = dfa.transitions[q]?.[symbol];
                    if (next && !reachable.has(next)) {
                        reachable.add(next);
                        queue.push(next);
                    }
                }
            }
            
            let unreachable = dfa.states.filter(s => !reachable.has(s));
            let workingStates = dfa.states.filter(s => reachable.has(s));

            steps.push({
                title: "Step 1: Remove Unreachable States",
                description: unreachable.length > 0 
                    ? `States { ${unreachable.join(', ')} } cannot be reached from start state ${dfa.startState}. They are removed.`
                    : "All states are reachable. No states removed.",
                partitions: [workingStates],
                unreachable: unreachable,
                isFinal: false
            });

            // 2. Initial Partition (P0)
            let finalStates = workingStates.filter(s => dfa.acceptingStates.includes(s));
            let nonFinalStates = workingStates.filter(s => !dfa.acceptingStates.includes(s));
            let partitions = [];
            if (nonFinalStates.length > 0) partitions.push(nonFinalStates);
            if (finalStates.length > 0) partitions.push(finalStates);

            let piK = 0;
            steps.push({
                title: "Step 2: Initial Partition (0-Equivalence)",
                description: "We separate the states into two initial groups: Accepting states (Final) and Non-Accepting states.",
                piNotation: formatPi(piK, partitions),
                partitions: JSON.parse(JSON.stringify(partitions)),
                partitionTable: buildPartitionTable(workingStates, partitions, partitions, dfa),
                isFinal: false
            });

            // 3. Iterative Refinement
            let p = partitions;
            let changed = true;
            
            while (changed) {
                changed = false;
                let newP = [];
                let splitsOccurred = [];

                for (let group of p) {
                    if (group.length <= 1) {
                        newP.push(group);
                        continue;
                    }
                    
                    let subGroups = {};
                    for (let state of group) {
                        let signature = dfa.alphabet.map(symbol => {
                            let target = dfa.transitions[state][symbol];
                            return p.findIndex(g => g.includes(target));
                        }).join(',');

                        if (!subGroups[signature]) subGroups[signature] = [];
                        subGroups[signature].push(state);
                    }

                    let splits = Object.values(subGroups);
                    if (splits.length > 1) {
                        changed = true;
                        splitsOccurred.push(`Group {${group.join(',')}} split because states transition to different groups on some inputs.`);
                    }
                    newP.push(...splits);
                }

                if (changed) {
                    piK++;
                    steps.push({
                        title: `Step ${2+piK}: Refine Partitions (${piK}-Equivalence)`,
                        description: splitsOccurred.join(" "),
                        piNotation: formatPi(piK, newP),
                        partitions: JSON.parse(JSON.stringify(newP)),
                        partitionTable: buildPartitionTable(workingStates, p, newP, dfa),
                        isFinal: false
                    });
                    p = newP;
                }
            }

            // Flag this step specifically so UI knows to animate the magnetic merge!
            steps.push({
                title: `Step ${2+piK}: Equivalence Stabilized`,
                description: "No further splitting is possible. States remaining in the same partition are strictly equivalent. Watch them merge!",
                piNotation: formatPi(piK, p),
                partitions: JSON.parse(JSON.stringify(p)),
                partitionTable: buildPartitionTable(workingStates, p, p, dfa),
                isFinal: false,
                isStabilized: true 
            });

            // Final Step: Minimized DFA
            let finalTransitions = [];
            p.forEach(group => {
                let rep = group[0];
                let stateName = `{${group.join(',')}}`;
                let transitions = {};
                dfa.alphabet.forEach(sym => {
                    let target = dfa.transitions[rep]?.[sym];
                    if (target) {
                        let tg = p.find(g => g.includes(target));
                        transitions[sym] = tg ? `{${tg.join(',')}}` : '-';
                    } else {
                        transitions[sym] = '-';
                    }
                });
                finalTransitions.push({ state: stateName, transitions });
            });

            steps.push({
                title: "Final Step: Merged Minimized DFA",
                description: "Equivalent states have been visually merged into single nodes. This is the final optimal DFA.",
                piNotation: formatPi(piK, p),
                partitions: JSON.parse(JSON.stringify(p)),
                finalTransitions: finalTransitions,
                isFinal: true
            });

            return steps;
        }

        // --- COMPONENTS ---

        // NEW: Shared Top Mode Selector Component
        const ModeSelector = ({ mode, setMode }) => (
            <div className="flex bg-slate-900/90 p-1.5 rounded-full border border-slate-700/50 shadow-[0_0_20px_rgba(0,0,0,0.6)] z-[100] backdrop-blur-md">
                {[
                    { id: 'simulation', label: 'Simulation' },
                    { id: 'learning', label: 'Learning' },
                    { id: 'quiz', label: 'Quiz' }
                ].map(m => (
                    <button
                        key={m.id}
                        onClick={() => setMode(m.id)}
                        className={`px-6 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition-all duration-300 ${
                            mode === m.id 
                            ? 'bg-cyan-500/20 text-cyan-300 shadow-[0_0_10px_rgba(6,182,212,0.3)] border border-cyan-500/30' 
                            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800 border border-transparent'
                        }`}
                    >
                        {m.label}
                    </button>
                ))}
            </div>
        );

        // 1. Futuristic Graph Visualizer Component
        const DfaGraph = ({ dfa, stepData }) => {
            const containerRef = useRef(null);
            const networkRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const { partitions, isFinal, isStabilized, unreachable } = stepData;
                let nodesData = [];
                let edgesData = [];

                if (!isFinal) {
                    // Show original states, color-coded by partition
                    dfa.states.forEach(state => {
                        if (unreachable && unreachable.includes(state)) return;

                        let pIndex = partitions.findIndex(p => p.includes(state));
                        if (pIndex === -1) pIndex = 0;
                        const color = PARTITION_COLORS[pIndex % PARTITION_COLORS.length];
                        const isAcc = dfa.acceptingStates.includes(state);

                        nodesData.push({
                            id: state,
                            label: state,
                            title: `State: ${state} ${isAcc ? '(Accepting)' : ''}\nPartition: G${pIndex+1}`,
                            shape: 'image',
                            image: createNodeSvg(state, isAcc, color),
                            size: 45,
                        });
                    });

                    dfa.states.forEach(fromState => {
                        if (unreachable && unreachable.includes(fromState)) return;
                        
                        let transitionMap = {};
                        dfa.alphabet.forEach(symbol => {
                            let toState = dfa.transitions[fromState]?.[symbol];
                            if (toState && (!unreachable || !unreachable.includes(toState))) {
                                if (!transitionMap[toState]) transitionMap[toState] = [];
                                transitionMap[toState].push(symbol);
                            }
                        });

                        Object.keys(transitionMap).forEach(toState => {
                            edgesData.push({
                                from: fromState,
                                to: toState,
                                label: transitionMap[toState].join(', '),
                                arrows: { to: { enabled: true, scaleFactor: 0.8, type: 'arrow' } },
                                font: { color: '#38bdf8', strokeWidth: 4, strokeColor: '#020617', size: 14, align: 'top', bold: true },
                                color: { color: 'rgba(56, 189, 248, 0.4)', highlight: 'rgba(56, 189, 248, 1)', hover: 'rgba(56, 189, 248, 0.8)' },
                                smooth: { type: 'continuous' },
                                shadow: { enabled: true, color: 'rgba(56, 189, 248, 0.6)', size: 15, x: 0, y: 0 }
                            });
                        });
                    });

                    // MAGIC: If stabilized, add intense invisible gravity between grouped states to animate a magnetic merge!
                    if (isStabilized) {
                        partitions.forEach((group) => {
                            if (group.length > 1) {
                                let rep = group[0];
                                for (let i = 1; i < group.length; i++) {
                                    edgesData.push({
                                        from: rep,
                                        to: group[i],
                                        hidden: true, // Invisible but physics active
                                        physics: true,
                                        length: 1, // Pull them to the exact same spot
                                        springConstant: 1.5 // Very strong magnetic pull
                                    });
                                }
                            }
                        });
                    }
                } else {
                    // Final Merged Graph
                    partitions.forEach((group, index) => {
                        const name = group.join(',');
                        const color = PARTITION_COLORS[index % PARTITION_COLORS.length];
                        const isAcc = group.some(s => dfa.acceptingStates.includes(s));
                        
                        nodesData.push({
                            id: name,
                            label: `{${name}}`,
                            title: `Merged State: {${name}}\n${isAcc ? 'Accepting' : 'Normal'}`,
                            shape: 'image',
                            image: createNodeSvg(`{${name}}`, isAcc, color),
                            size: 55, // Slightly larger to indicate it's merged
                        });
                    });

                    partitions.forEach((group) => {
                        const fromName = group.join(',');
                        const repState = group[0];
                        
                        let transitionMap = {};
                        dfa.alphabet.forEach(symbol => {
                            let originalTarget = dfa.transitions[repState]?.[symbol];
                            if (originalTarget) {
                                let targetGroup = partitions.find(p => p.includes(originalTarget));
                                if (targetGroup) {
                                    let toName = targetGroup.join(',');
                                    if (!transitionMap[toName]) transitionMap[toName] = [];
                                    transitionMap[toName].push(symbol);
                                }
                            }
                        });

                >
                    {/* Header HUD */}
                    <header className="glass px-6 py-4 flex justify-between items-center border-b border-white/10 z-20 shadow-2xl relative">
                        <div className="absolute bottom-0 left-0 h-[2px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent w-full opacity-50"></div>
                        <div className="flex items-center space-x-6 w-1/3">
                            <h1 className="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-lg">
                                NEXUS VISUALIZER
                            </h1>
                            <div className="flex items-center space-x-2 bg-slate-900/80 px-4 py-1.5 rounded-full border border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.2)]">
                                <span className="text-cyan-400 animate-pulse text-xs">●</span>
                                <span className="text-slate-300 text-xs font-bold font-mono tracking-widest">
                                    PHASE {currentStepIndex + 1} / {steps.length}
                                </span>
                            </div>
                        </div>

                        {/* Insert ModeSelector into header dynamically */}
                        <div className="flex justify-center w-1/3">
                            <ModeSelector mode="simulation" setMode={setMode} />
                        </div>

                        <div className="w-1/3 flex items-center justify-end space-x-4">
                            <motion.button 
                                whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}
                                onClick={() => setIsPlaying(!isPlaying)}
                                className={`flex items-center space-x-2 px-5 py-2.5 rounded-xl font-bold uppercase text-xs tracking-wider transition-all shadow-lg ${isPlaying ? 'bg-amber-500/10 text-amber-400 border border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.3)]' : 'bg-blue-600/80 hover:bg-blue-500 text-white border border-blue-400/50 shadow-[0_0_15px_rgba(59,130,246,0.4)]'}`}
                            >
                                {isPlaying ? <><PauseIcon/> <span>Halt Routine</span></> : <><PlayIcon/> <span>Auto Sequence</span></>}
                            </motion.button>
                            
                            <motion.button 
                                whileHover={currentStepIndex !== steps.length - 1 ? { scale: 1.05, boxShadow: "0 0 15px rgba(16, 185, 129, 0.4)" } : {}} 
                                whileTap={currentStepIndex !== steps.length - 1 ? { scale: 0.95 } : {}}
                                onClick={() => setCurrentStepIndex(p => Math.min(steps.length - 1, p + 1))}
                                disabled={currentStepIndex === steps.length - 1}
                                className="flex items-center space-x-2 px-5 py-2.5 bg-slate-800/80 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl text-emerald-400 border border-emerald-500/30 uppercase text-xs font-bold tracking-wider"
                            >
                                <span>Next Phase</span> <NextIcon/>
                            </motion.button>

                            <div className="w-px h-8 bg-slate-700/50 mx-2"></div>

                            <motion.button 
                                whileHover={{ scale: 1.05, backgroundColor: "rgba(239, 68, 68, 0.1)", color: "#ef4444", borderColor: "rgba(239, 68, 68, 0.5)" }} 
                                whileTap={{ scale: 0.95 }}
                                onClick={() => setDfa(null)}
                                className="flex items-center space-x-2 px-4 py-2.5 bg-slate-800/50 rounded-xl text-slate-400 border border-slate-600/50 transition-all uppercase text-xs font-bold"
                            >
                                <ResetIcon/> <span>Reboot</span>
                            </motion.button>
                        </div>
                    </header>

                    {/* Main Layout */}
                    <main className="flex-1 flex overflow-hidden relative z-10">
                        
                        {/* Data Telemetry Sidebar */}
                        <motion.aside 
                            initial={{ x: -600, opacity: 0 }} animate={{ x: 0, opacity: 1 }} transition={{ type: "spring", stiffness: 60, damping: 15 }}
                            className="w-[450px] lg:w-[500px] border-r border-cyan-900/30 glass-panel flex flex-col z-20 shrink-0 shadow-[20px_0_30px_-10px_rgba(0,0,0,0.5)]"
                        >
                            <div className="p-8 overflow-y-auto h-full scroll-smooth">
                                <AnimatePresence mode="wait">
                                    <motion.div 
                                        key={currentStepIndex}
                                        initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.4 }}
                                    >
                                        <h2 className="text-2xl font-black mb-4 text-white uppercase tracking-wide drop-shadow-md">{currentStep.title}</h2>
                                        
                                        {currentStep.piNotation && (
                                            <div className="mb-6 p-4 bg-slate-950/80 rounded-xl border-l-4 border-cyan-500 font-mono text-cyan-300 text-sm overflow-x-auto whitespace-nowrap shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
                                                {currentStep.piNotation}
                                            </div>
                                        )}

                                        <p className="text-slate-300 leading-relaxed mb-8 bg-slate-800/40 p-5 rounded-xl border border-slate-700/50 backdrop-blur-sm text-sm">
                                            {currentStep.description}
                                        </p>

                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-xs font-bold tracking-widest text-slate-500 uppercase">Memory Partitions</h3>
                                            <span className="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded font-mono border border-slate-700">COUNT: {currentStep.partitions.length}</span>
                                        </div>
                                        
                                        <LayoutGroup>
                                            <div className="space-y-4">
                                                <AnimatePresence>
                                                    {currentStep.partitions.map((group, idx) => {
                                                        const color = PARTITION_COLORS[idx % PARTITION_COLORS.length];
                                                        const groupKey = currentStep.isFinal ? `final-${idx}` : group.join('-');
                                                        return (
                                                            <motion.div 
                                                                layout
                                                                initial={{ opacity: 0, scale: 0.9, x: -20 }} 
                                                                animate={{ opacity: 1, scale: 1, x: 0 }} 
                                                                exit={{ opacity: 0, scale: 0.9 }}
                                                                transition={{ type: "spring", stiffness: 300, damping: 25 }}
                                                                key={groupKey} 
                                                                className="p-5 rounded-2xl border relative overflow-hidden backdrop-blur-md"
                                                                style={{ 
                                                                    backgroundColor: `${color.bg}15`, 
                                                                    borderColor: `${color.border}50`,
                                                                    boxShadow: `0 8px 30px -10px ${color.shadow}40`
                                                                }}
                                                            >
                                                                <div className="absolute left-0 top-0 bottom-0 w-1 opacity-50" style={{ backgroundColor: color.border }}></div>
                                                                
                                                                <div className="flex items-center space-x-3 mb-3">
                                                                    <div className="w-3 h-3 rounded-full shadow-[0_0_10px_currentColor]" style={{ backgroundColor: color.bg, color: color.shadow }}></div>
                                                                    <span className="font-black text-white text-md tracking-wider">
                                                                        {currentStep.isFinal ? `MERGED NODE {${group.join(',')}}` : `CLUSTER ${idx + 1}`}
                                                                    </span>
                                                                </div>
                                                                <div className="flex flex-wrap gap-2 pl-6">
                                                                    {!currentStep.isFinal && group.map(state => (
                                                                        <span key={state} className="font-mono font-bold bg-slate-900/90 text-slate-200 px-3 py-1.5 rounded-lg text-sm border shadow-inner" style={{ borderColor: `${color.border}30` }}>
                                                                            {state} {dfa.acceptingStates.includes(state) && <span className="text-emerald-400 ml-1 drop-shadow-[0_0_5px_rgba(16,185,129,0.8)]">★</span>}
                                                                        </span>
                                                                    ))}
                                                                    {currentStep.isFinal && (
                                                                        <span className="text-xs text-slate-400 uppercase tracking-widest font-bold">Optimization Complete.</span>
                                                                    )}
                                                                </div>
                                                            </motion.div>
                                                        );
                                                    })}
                                                </AnimatePresence>
                                            </div>
                                        </LayoutGroup>
                                        
                                        {/* Intermediate Partition Table */}
                                        {currentStep.partitionTable && !currentStep.isFinal && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.3 }} className="mt-10">
                                                <h3 className="text-xs font-bold tracking-widest text-blue-400 uppercase mb-3 flex items-center"><span className="w-2 h-2 bg-blue-500 rounded-full mr-2 animate-ping"></span> Transition Signature</h3>
                                                <div className="overflow-x-auto rounded-xl border border-slate-700/60 shadow-[0_10px_30px_-10px_rgba(0,0,0,0.5)] bg-slate-900/60 backdrop-blur-md">
                                                    <table className="w-full text-left text-xs">
                                                        <thead className="bg-slate-800/80 text-slate-300">
                                                            <tr>
                                                                <th className="p-3 border-b border-slate-700/80 font-bold uppercase tracking-wider w-16">Node</th>
                                                                {dfa.alphabet.map(a => <th key={a} className="p-3 border-b border-slate-700/80 font-bold text-center">Via '{a}'</th>)}
                                                                <th className="p-3 border-b border-slate-700/80 font-black text-center bg-blue-900/30 text-blue-300">New Target</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {currentStep.partitionTable.map((row, i) => {
                                                                const groupColor = PARTITION_COLORS[row.newGroupIndex % PARTITION_COLORS.length];
                                                                return (
                                                                <tr key={i} className="border-b border-slate-700/30 hover:bg-slate-800/60 transition-colors">
                                                                    <td className="p-3 font-mono text-emerald-400 font-bold border-r border-slate-700/30">{row.state}</td>
                                                                    {dfa.alphabet.map(a => (
                                                                        <td key={a} className="p-3 text-slate-300 text-center font-mono">
                                                                            {row.inputs[a] !== '-' ? `C${row.inputs[a] + 1}` : '-'}
                                                                        </td>
                                                                    ))}
                                                                    <td className="p-3 text-center font-black border-l border-slate-700/30 bg-slate-950/30" style={{ color: groupColor.shadow, textShadow: `0 0 10px ${groupColor.shadow}80` }}>
                                                                        CLUSTER {row.newGroupIndex + 1}
                                                                    </td>
                                                                </tr>
                                                            )})}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </motion.div>
                                        )}

                                        {/* Final Minimized Table */}
                                        {currentStep.finalTransitions && (
                                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.3 }} className="mt-10">
                                                <h3 className="text-xs font-bold tracking-widest text-emerald-400 uppercase mb-3 flex items-center"><span className="w-2 h-2 bg-emerald-500 rounded-full mr-2 shadow-[0_0_8px_currentColor]"></span> Optimized Blueprint</h3>
                                                <div className="overflow-x-auto rounded-xl border border-emerald-900/50 shadow-[0_10px_30px_-10px_rgba(16,185,129,0.3)] bg-slate-900/80">
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-emerald-950/40 text-emerald-200">
                                                            <tr>
                                                                <th className="p-4 border-b border-emerald-900/50 font-bold uppercase tracking-wider">Merged Node</th>
                                                                {dfa.alphabet.map(a => <th key={a} className="p-4 border-b border-emerald-900/50 font-bold text-center">Via '{a}'</th>)}
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {currentStep.finalTransitions.map((row, i) => (
                                                                <tr key={i} className="border-b border-emerald-900/20 hover:bg-emerald-900/20 transition-colors">
                                                                    <td className="p-4 font-mono text-white font-black border-r border-emerald-900/30">{row.state}</td>
                                                                    {dfa.alphabet.map(a => (
                                                                        <td key={a} className="p-4 font-mono text-emerald-300 text-center font-bold">{row.transitions[a]}</td>
                                                                    ))}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </motion.div>
                                        )}
                                    </motion.div>
                                </AnimatePresence>

                                {/* Progress Tracker Timeline - Animated */}
                                <div className="mt-16 pt-8 border-t border-slate-700/50 pb-8">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Execution Timeline</h3>
                                    <div className="relative w-full h-1 bg-slate-800 rounded-full">
                                        {/* Filled track */}
                                        <motion.div 
                                            className="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.5)]"
                                            initial={{ width: 0 }}
                                            animate={{ width: `${(currentStepIndex / (steps.length - 1)) * 100}%` }}
                                            transition={{ type: "spring", stiffness: 50, damping: 15 }}
                                        ></motion.div>
                                        
                                        <div className="absolute top-1/2 left-0 right-0 flex justify-between transform -translate-y-1/2">
                                            {steps.map((_, idx) => (
                                                <div key={idx} className="relative">
                                                    <motion.div 
                                                        animate={{
                                                            scale: idx === currentStepIndex ? 1.5 : 1,
                                                            backgroundColor: idx === currentStepIndex ? '#22d3ee' : idx < currentStepIndex ? '#3b82f6' : '#1e293b',
                                                            borderColor: idx === currentStepIndex ? '#fff' : idx < currentStepIndex ? '#60a5fa' : '#334155'
                                                        }}
                                                        className="w-3 h-3 rounded-full border-2 cursor-pointer z-10 relative"
                                                        onClick={() => setCurrentStepIndex(idx)}
                                                    ></motion.div>
                                                    {idx === currentStepIndex && (
                                                        <motion.div 
                                                            layoutId="glow"
                                                            className="absolute inset-0 bg-cyan-400 rounded-full filter blur-md -z-10"
                                                            style={{ transform: 'scale(2.5)' }}
                                                        ></motion.div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </motion.aside>

                        {/* Visualizer Canvas Area */}
                        <section className="flex-1 relative z-10">
                            
                            {/* HUD Legend */}
                            <motion.div 
                                initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.5 }}
                                className="absolute top-6 right-6 glass px-5 py-4 rounded-2xl z-20 shadow-2xl border-cyan-500/20 pointer-events-none"
                            >
                                <div className="text-[10px] font-black text-cyan-500 mb-3 uppercase tracking-widest text-center">Telemetry Legend</div>
                                <div className="space-y-3 text-xs font-bold text-slate-300 font-mono tracking-wider">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-5 h-5 rounded-full border-[3px] border-slate-400 shadow-[0_0_8px_rgba(148,163,184,0.5)]"></div>
                                        <span>Standard Node</span>
                                    </div>
                                    <div className="flex items-center space-x-3">
                                        <div className="w-5 h-5 rounded-full border-[3px] border-emerald-400 shadow-[0_0_12px_rgba(16,185,129,0.8)] relative flex items-center justify-center">
                                            <div className="absolute w-3 h-3 border border-emerald-400 border-dashed rounded-full animate-spin-slow"></div>
                                        </div>
                                        <span>Target (Accepting)</span>
                                    </div>
                                    <div className="flex items-center space-x-3 mt-3 pt-3 border-t border-slate-700/50">
                                        <div className="w-8 h-1 bg-gradient-to-r from-transparent to-cyan-400 relative rounded-full">
                                            <div className="absolute right-[-4px] top-1/2 -translate-y-1/2 border-[5px] border-transparent border-l-cyan-400"></div>
                                        </div>
                                        <span>Data Flow</span>
                                    </div>
                                </div>
                            </motion.div>

                            <DfaGraph dfa={dfa} stepData={currentStep} />
                        </section>

                    </main>
                </motion.div>
            );
        };

        // NEW: Root App Wrapper switching modes
        const App = () => {
            const [mode, setMode] = useState('simulation');
            
            return (
                <div className="relative min-h-screen w-full font-sans text-slate-100">
                    {mode === 'simulation' && <SimulationMode setMode={setMode} />}
                    {mode === 'learning' && <LearningPanel setMode={setMode} />}
                    {mode === 'quiz' && <QuizPanel setMode={setMode} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
